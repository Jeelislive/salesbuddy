services:
  - type: web
    name: salesbuddy-api
    runtime: node
    rootDir: .
    buildCommand: npm install --ignore-scripts && cd apps/api && npm install --ignore-scripts
    startCommand: cd apps/api && npx ts-node --transpile-only -r tsconfig-paths/register src/main.ts
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://salesbuddy-tau.vercel.app
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: CRON_SECRET
        sync: false
